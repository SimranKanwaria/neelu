<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neelu Kanwaria | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}

.container{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#fff;
  padding:30px 20px;
  border-right:1px solid #e5e5e5;
}

.profile{text-align:center}
.profile img{
  width:120px;height:120px;border-radius:20px;object-fit:cover;margin-bottom:15px
}
.profile h2{font-size:1.2rem;margin-bottom:5px}
.profile p{font-size:0.85rem;color:#777;margin-bottom:15px}

.menu{margin-top:20px}
.menu a{
  display:block;
  padding:10px;
  text-decoration:none;
  color:#555;
  border-left:3px solid transparent;
  margin-bottom:8px;
}
.menu a.active,.menu a:hover{
  border-color:#3498db;
  color:#000;
}

/* MAIN */
.main{flex:1;padding:20px 30px}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.filters button{
  border:1px solid #ddd;
  background:#fff;
  padding:6px 14px;
  margin-right:10px;
  border-radius:20px;
  cursor:pointer;
}
.filters button.active{
  background:#3498db;color:#fff;border:none
}

.search input{
  padding:6px 10px;
  border:1px solid #ddd;
  border-radius:20px;
}

/* GALLERY */
.gallery{
  column-count:3;
  column-gap:15px;
}

.card{
  background:#fff;
  margin-bottom:15px;
  border-radius:10px;
  overflow:hidden;
  display:inline-block;
  width:100%;
}

.card img{
  width:100%;
  display:block;
}

.card-content{
  padding:10px;
}

.price{color:#3498db;font-weight:600}

@media(max-width:1000px){
  .gallery{column-count:2}
}
@media(max-width:600px){
  .container{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid #ddd}
  .gallery{column-count:1}
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="profile">
    <img src="https://via.placeholder.com/120" alt="artist">
    <h2>Neelu Kanwaria</h2>
    <p>Contemporary Abstract Artist</p>
  </div>

  <div class="menu">
    <a href="#" class="active">Portfolio</a>
    <a href="#">About</a>
    <a href="#">News</a>
    <a href="#">Collections</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div class="filters">
      <button class="active">All</button>
      <button>Available</button>
      <button>Sold</button>
    </div>

    <div class="search">
      <input type="text" placeholder="Search">
    </div>
  </div>

  <div class="gallery" id="gallery"></div>

</div>

</div>

<script>
fetch('data.json')
.then(res=>res.json())
.then(data=>{
  const gallery=document.getElementById('gallery')

  data.forEach(item=>{
    const card=document.createElement('div')
    card.className='card'

    card.innerHTML=`
      <img src="${item.image}" />
      <div class="card-content">
        <h4>${item.title}</h4>
        <p class="price">₹${item.price}</p>
      </div>
    `

    gallery.appendChild(card)
  })
})
</script>

</body>
</html>
