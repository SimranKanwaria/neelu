<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neelu Artist - Paintings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }
    
    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
    
    .card-content {
      padding: 20px;
    }
    
    .card h3 {
      font-size: 1.3em;
      margin-bottom: 10px;
      color: #333;
    }
    
    .card p {
      color: #666;
      font-size: 0.95em;
      margin-bottom: 15px;
      line-height: 1.5;
    }
    
    .price {
      color: #667eea;
      font-weight: bold;
      font-size: 1.3em;
    }
    
    .loading {
      text-align: center;
      color: white;
      font-size: 1.2em;
    }
    
    .error {
      text-align: center;
      color: #ff6b6b;
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Neelu Artist - Paintings</h1>
    <div class="gallery" id="gallery">
      <p class="loading">Loading paintings...</p>
    </div>
  </div>

  <script>
    fetch('data.json')
      .then(res => {
        if (!res.ok) throw new Error('Failed to load data');
        return res.json();
      })
      .then(data => {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        
        if (data.length === 0) {
          gallery.innerHTML = '<p class="error">No paintings found. Make sure your Notion database has published items!</p>';
          return;
        }
        
        data.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/280x250?text=No+Image'">
            <div class="card-content">
              <h3>${item.title}</h3>
              <p>${item.description}</p>
              <p class="price">₹${item.price.toLocaleString('en-IN')}</p>
            </div>
          `;
          gallery.appendChild(card);
        });
      })
      .catch(err => {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = `<p class="error">Error loading paintings: ${err.message}</p>`;
        console.error('Error:', err);
      });
  </script>
</body>
</html>
